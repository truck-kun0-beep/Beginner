        <header>
        
        <section class="hero">
            <figure>
            <img src="ChatGPT Image Sep 9, 2025, 03_16_48 AM.png" alt="Tea Time" title="Tea ready to drink!"
                width="1000" height="649">
            <figcaption class="offscreen">
                Tea Time
            </figcaption>
            </figure>
        </section>
        
        <main class="main">
             <article class="main__article">
                <h2>Our Location</h2>
            <address>
                Barekmollar Mor,60 Feet,<br>
                Mirpur-1, Dhaka-1216, Bangladesh
                <br><br>
                Phone: <a href="tel:+55555555555">0199-042-1055</a>
            </address>
            <article class="main__article contract">
                <h2 class="contract__h2">Our Contact Form</h2>
                <form action="https://httpbin.org/get" method="get" class="contract__form">
                    <fieldset>
                        <legend class="offscreen">Send Us a Message</legend>
                        <p class="contract__p">
                            <label class="contract__label" for="name">Name:</label>
                            <input  class="contract__label" type="text" name="name" id="name" placeholder="your email" required>

                        </p>
                        <p class="contract__p">
                            <label class="contract__label" for="message">Your Message:</label>
                        <br>
                        <textarea class="contract__textarea" name="message" id="message" cols="30" rows="10"
                            placeholder="Type your message here"></textarea>
                        </p>
                    </fieldset>
                    <button class="contract__button" type="submit">Send</button>
                    <button class="contract__button" type="reset">Reset</button>
                </form>
            </article>
           
            </article>
